<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Project Abyss</title>
  <style>
    @font-face {
      font-family: 'Press Start 2P';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('./fonts/PressStart2P.woff2') format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
  <script type="module" crossorigin src="/ProjectAbyss/assets/index-CC7Gb6vz.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="load-status" style="position:fixed;top:10px;left:10px;color:#0f0;font-family:monospace;font-size:14px;z-index:9999;">Starting...</div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.style.color = '#f44';
      document.body.style.padding = '20px';
      document.body.style.fontFamily = 'monospace';
      document.body.innerHTML = '<h2>Error</h2><pre>' + msg + '\n' + src + ':' + line + ':' + col + '\n' + (err && err.stack || '') + '</pre>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.body.style.color = '#f44';
      document.body.style.padding = '20px';
      document.body.style.fontFamily = 'monospace';
      document.body.innerHTML = '<h2>Error</h2><pre>' + (e.reason && e.reason.stack || e.reason || 'Unknown') + '</pre>';
    });
  </script>
</body>
</html>
