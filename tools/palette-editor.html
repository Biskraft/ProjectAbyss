<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ECHORIS Palette Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0A0A0A; color: #C0C0C0; font-family: 'Inter', sans-serif;
  font-weight: 300; font-size: 13px; cursor: crosshair;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
/* ── Grid overlay ── */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(to right, rgba(26,58,58,.15) 0 1px, transparent 1px 80px),
              repeating-linear-gradient(to bottom, rgba(26,58,58,.15) 0 1px, transparent 1px 80px);
}
/* ── Scanlines ── */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  background: repeating-linear-gradient(to bottom, transparent 0 1px, rgba(0,0,0,.03) 1px 2px);
}
/* ── Layout ── */
.toolbar {
  display: flex; gap: 12px; padding: 8px 12px; background: #101014;
  border-bottom: 1px solid #1A3A3A; align-items: center; flex-shrink: 0;
  flex-wrap: wrap;
}
.toolbar label { font-family: 'Rajdhani', sans-serif; font-weight: 600; color: #4A8A8A; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; }
.toolbar input[type="file"] { display: none; }
.toolbar .btn {
  background: none; border: 1px solid #1A3A3A; color: #C0C0C0; padding: 4px 12px;
  font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 12px;
  text-transform: uppercase; cursor: pointer; letter-spacing: .5px;
}
.toolbar .btn:hover { border-color: #E87830; color: #E87830; }
.toolbar .btn.primary { border-color: #E87830; color: #E87830; }
.toolbar select {
  background: #0A0A0A; border: 1px solid #1A3A3A; color: #E87830;
  font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 12px;
  padding: 4px 8px; cursor: pointer; min-width: 160px;
}
.toolbar select:hover { border-color: #E87830; }
.toolbar select option { background: #101014; color: #C0C0C0; }
.main { display: flex; flex: 1; overflow: hidden; }
/* ── Content: left preview + right controls ── */
.preview-pane {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px; overflow: auto; min-width: 0;
}
.controls-pane {
  width: 380px; flex-shrink: 0; overflow-y: auto; padding: 12px;
  border-left: 1px solid #1A3A3A; background: #0D0D10;
  display: flex; flex-direction: column; gap: 12px;
}
.section-label {
  font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 11px;
  color: #4A8A8A; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
}
/* ── Preview ── */
.preview-wrap {
  background: #101014; border: 1px solid #1A3A3A; padding: 8px; display: inline-block;
}
.preview-wrap canvas { display: block; image-rendering: pixelated; }
/* ── Gradient strip ── */
.gradient-section { background: #101014; border: 1px solid #1A3A3A; padding: 12px; }
.gradient-bar { height: 32px; width: 100%; margin-bottom: 8px; image-rendering: pixelated; }
.stops-list { display: flex; flex-direction: column; gap: 4px; }
.stop-row {
  display: flex; align-items: center; gap: 8px; padding: 4px;
  border: 1px solid transparent;
}
.stop-row:hover { border-color: #1A3A3A; }
.stop-row input[type="color"] {
  width: 28px; height: 22px; border: 1px solid #1A3A3A; background: #0A0A0A;
  cursor: pointer; padding: 0;
}
.stop-row input[type="range"] { flex: 1; max-width: 120px; accent-color: #E87830; }
.stop-row .hex-val {
  font-family: 'Rajdhani', sans-serif; font-size: 12px; color: #C0C0C0;
  width: 60px; background: #0A0A0A; border: 1px solid #1A3A3A; padding: 2px 4px;
  text-align: center;
}
.stop-row .t-val {
  font-family: 'Rajdhani', sans-serif; font-size: 11px; color: #4A8A8A; width: 36px;
  text-align: right;
}
.stop-row .btn-del {
  background: none; border: none; color: #3A3A48; cursor: pointer;
  font-size: 14px; line-height: 1;
}
.stop-row .btn-del:hover { color: #E87830; }
.btn-add-stop {
  background: none; border: 1px dashed #1A3A3A; color: #4A8A8A; padding: 4px 12px;
  font-family: 'Rajdhani', sans-serif; font-size: 11px; cursor: pointer;
  text-transform: uppercase; margin-top: 4px;
}
.btn-add-stop:hover { border-color: #E87830; color: #E87830; }
/* ── Params ── */
.params-section { background: #101014; border: 1px solid #1A3A3A; padding: 12px; }
.param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.param-row label {
  font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 11px;
  color: #4A8A8A; width: 90px; text-transform: uppercase;
}
.param-row input[type="range"] { flex: 1; max-width: 200px; accent-color: #E87830; }
.param-row input[type="color"] {
  width: 28px; height: 22px; border: 1px solid #1A3A3A; background: #0A0A0A;
  cursor: pointer; padding: 0;
}
.param-row .param-val {
  font-family: 'Rajdhani', sans-serif; font-size: 12px; color: #C0C0C0; width: 60px;
}
.param-row input[type="text"].param-text {
  font-family: 'Rajdhani', sans-serif; font-size: 12px; color: #C0C0C0;
  background: #0A0A0A; border: 1px solid #1A3A3A; padding: 2px 6px;
  width: 140px;
}
.param-row input[type="text"].param-text:focus { border-color: #E87830; outline: none; }
/* ── Collapsible parallax ── */
.parallax-section { background: #101014; border: 1px solid #1A3A3A; padding: 0; }
.parallax-header {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px; cursor: pointer;
  user-select: none;
}
.parallax-header:hover { background: #14141a; }
.parallax-header .chevron {
  font-family: 'Rajdhani', sans-serif; font-size: 10px; color: #3A3A48;
  transition: transform .15s;
}
.parallax-header.open .chevron { transform: rotate(90deg); }
.parallax-body { padding: 0 12px 12px; display: none; }
.parallax-body.open { display: block; }
/* ── Tint swatch inline ── */
.tint-swatch {
  display: inline-block; width: 12px; height: 12px; border: 1px solid #1A3A3A;
  vertical-align: middle; margin-left: 4px;
}
/* ── Drop overlay ── */
.drop-overlay {
  position: fixed; inset: 0; background: rgba(10,10,10,.9);
  display: none; align-items: center; justify-content: center; z-index: 100;
  border: 2px dashed #E87830;
}
.drop-overlay.active { display: flex; }
.drop-overlay span { font-family: 'Rajdhani', sans-serif; font-size: 24px; color: #E87830; }
/* ── Status ── */
.status { font-family: 'Rajdhani', sans-serif; font-size: 11px; color: #3A3A48; padding: 0 12px; }
.status.ok { color: #4A8A8A; }
/* ── Scrollbar ── */
.controls-pane::-webkit-scrollbar { width: 6px; }
.controls-pane::-webkit-scrollbar-track { background: #0A0A0A; }
.controls-pane::-webkit-scrollbar-thumb { background: #1A3A3A; border-radius: 3px; }
.controls-pane::-webkit-scrollbar-thumb:hover { background: #2A4A4A; }
</style>
</head>

// ── Palette math (mirrors PaletteSwapFilter.ts) ──
function lerp(a, b, t) { return a + (b - a) * t; }
function unpack(rgb) { return [(rgb >> 16) & 0xff, (rgb >> 8) & 0xff, rgb & 0xff]; }
function packHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0')).join('');
}
function hexToInput(n) { return '#' + (n & 0xffffff).toString(16).padStart(6, '0'); }
function sampleRow(stops, t) {
  const s = [...stops].sort((a, b) => a.t - b.t);
  if (s.length === 0) return [0, 0, 0];
  if (t <= s[0].t) return unpack(s[0].color);
  if (t >= s[s.length - 1].t) return unpack(s[s.length - 1].color);
  for (let i = 0; i < s.length - 1; i++) {
    if (t >= s[i].t && t <= s[i + 1].t) {
      const lt = (t - s[i].t) / Math.max(s[i + 1].t - s[i].t, 1e-6);
      const [ar, ag, ab] = unpack(s[i].color);
      const [br, bg, bb] = unpack(s[i + 1].color);
      return [lerp(ar, br, lt), lerp(ag, bg, lt), lerp(ab, bb, lt)];
    }
  }
  return unpack(s[s.length - 1].color);
}

function buildLUT(stops) {
  const lut = new Uint8Array(256 * 3);
  for (let x = 0; x < 256; x++) {
    const t = x / 255;
    const [r, g, b] = sampleRow(stops, t);
    lut[x * 3] = Math.round(r);
    lut[x * 3 + 1] = Math.round(g);
    lut[x * 3 + 2] = Math.round(b);
  }
  return lut;
}

// ── CSV parsing (all 16 columns) ──
function splitCsvLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
    cur += c;
  }
  cols.push(cur);
  return cols;
}
function parseHex(s) { return parseInt((s || '').trim().replace(/^0x/i, ''), 16) || 0; }
function parseStops(raw) {
  const stops = [];
  for (const pair of (raw || '').split('|')) {
    const [tStr, hexStr] = pair.split(':');
    if (!tStr || !hexStr) continue;
    stops.push({ t: parseFloat(tStr), color: parseHex(hexStr) });
  }
  return stops;
}

function loadCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  csvHeader = lines[0];
  csvEntries = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCsvLine(lines[i]);
    if (cols.length < 9) continue;
    csvEntries.push({
      id:              cols[0].trim(),
      name:            cols[1].trim(),
      layer:           cols[2].trim().toUpperCase(),
      brightness:      parseFloat(cols[3]) || 1.0,
      tint:            parseHex(cols[4]) || 0xffffff,
      depthBias:       parseFloat(cols[5]) || 0,
      depthCenter:     parseFloat(cols[6]) || 0.5,
      stops:           parseStops(cols[7]),
      description:     (cols[8] ?? '').trim(),
      tileset:         (cols[9] ?? '').trim(),
      parallaxImage:   (cols[10] ?? '').trim(),
      parallaxFactor:  (cols[11] ?? '').trim(),
      parallaxImageMid:(cols[12] ?? '').trim(),
      parallaxFactorMid:(cols[13] ?? '').trim(),
      parallaxImageNear:(cols[14] ?? '').trim(),
      parallaxFactorNear:(cols[15] ?? '').trim(),
    });
  }
  buildSidebar();
  status('CSV loaded: ' + csvEntries.length + ' entries', true);
}

// ── CSV export (all 16 columns) ──
function stopsToString(stops) {
  return [...stops].sort((a, b) => a.t - b.t)
    .map(s => s.t.toFixed(2) + ':' + (s.color & 0xffffff).toString(16).padStart(6, '0'))
    .join('|');
}
function entriesToCSV() {
  let out = csvHeader + '\n';
  for (const e of csvEntries) {
    out += [
      e.id, e.name, e.layer, e.brightness.toFixed(2),
      '0x' + (e.tint & 0xffffff).toString(16).padStart(6, '0').toUpperCase(),
      e.depthBias.toFixed(2), e.depthCenter.toFixed(2),
      stopsToString(e.stops), e.description, e.tileset,
      e.parallaxImage, e.parallaxFactor,
      e.parallaxImageMid, e.parallaxFactorMid,
      e.parallaxImageNear, e.parallaxFactorNear,
    ].join(',') + '\n';
  }
  return out;
}
function copyCSV() {
  navigator.clipboard.writeText(entriesToCSV()).then(() => status('CSV copied', true));
}
function downloadCSV() {
  const blob = new Blob([entriesToCSV()], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'Content_System_Area_Palette.csv'; a.click();
  status('CSV downloaded', true);
}

// ── Area selector ──
function getPairBase(id) { return id.replace(/_(bg|wall)$/i, ''); }
function buildSidebar() {
  const sel = document.getElementById('areaSelect');
  const seen = new Set();
  sel.innerHTML = '';
  for (const e of csvEntries) {
    const base = getPairBase(e.id);
    if (seen.has(base)) continue;
    seen.add(base);
    const opt = document.createElement('option');
    opt.value = base;
    opt.textContent = e.name ? base + ' (' + e.name + ')' : base;
    sel.appendChild(opt);
  }
  if (csvEntries.length > 0) selectPair(getPairBase(csvEntries[0].id));
}
function selectPair(base) {
  if (!base) return;
  selectedPairId = base;
  document.getElementById('areaSelect').value = base;
  renderEditor();
}

// ── Editor ──
function findEntry(base, layer) {
  return csvEntries.find(e => getPairBase(e.id) === base && e.layer === layer);
}

function renderEditor() {
  const previewPane = document.getElementById('previewPane');
  const controlsPane = document.getElementById('controlsPane');
  const bgEntry = findEntry(selectedPairId, 'BG');
  const wallEntry = findEntry(selectedPairId, 'WALL');

  previewPane.innerHTML =
    '<div class="preview-wrap"><canvas id="previewCanvas" width="' + MAP_W + '" height="' + MAP_H + '" style="width:' + (MAP_W * 3) + 'px;height:' + (MAP_H * 3) + 'px"></canvas></div>';

  let ctrl = '';
  if (bgEntry) ctrl += renderGradientSection(bgEntry, 'BG');
  if (wallEntry) ctrl += renderGradientSection(wallEntry, 'WALL');
  controlsPane.innerHTML = ctrl;

  bindStopEvents();
  renderPreview();
}

function renderGradientSection(entry, label) {

  html += paramRow(label, 'Brightness', 'brightness', entry.brightness, 0.5, 2.0, 0.01);

  html += '</div>';
  // Tileset (read-only display)
  if (entry.tileset) {
    html += '<div class="param-row">';
    html += '<label>Tileset</label>';
    html += '<span class="param-val" style="width:auto;color:#E87830">' + entry.tileset + '</span>';

  html += '</div>';

  if (entry.parallaxImage || entry.parallaxImageMid || entry.parallaxImageNear) {
    html += renderParallaxSection(entry, label);

  html += '</div>';
  return html;

    html += '<input type="text" class="param-text" value="' + img + '" data-layer="' + label + '" data-plx-field="' + pl.imgField + '" placeholder="image">';
    html += '<input type="text" class="param-text" style="width:50px" value="' + fac + '" data-layer="' + label + '" data-plx-field="' + pl.factField + '" placeholder="0.1">';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function toggleParallax(uid) {
  const hdr = document.getElementById(uid + '_hdr');
  const body = document.getElementById(uid + '_body');
  hdr.classList.toggle('open');
  body.classList.toggle('open');
}

function paramRow(layer, label, field, value, min, max, step) {
  return '<div class="param-row">' +
    '<label>' + label + '</label>' +
    '<input type="range" min="' + min + '" max="' + max + '" step="' + step + '" value="' + value + '" data-layer="' + layer + '" data-param="' + field + '">' +
    '<span class="param-val">' + value.toFixed(2) + '</span>' +
    '</div>';
}

function bindStopEvents() {
  // Gradient stop color/t changes
  document.querySelectorAll('.stop-row').forEach(row => {
    const layer = row.dataset.layer;
    const idx = parseInt(row.dataset.idx);
    const entry = findEntry(selectedPairId, layer);
    if (!entry) return;

    row.querySelector('[data-field="color"]').addEventListener('input', e => {
      const hex = e.target.value;
      entry.stops[idx].color = parseInt(hex.slice(1), 16);
      row.querySelector('[data-field="hextext"]').value = hex.slice(1);
      scheduleUpdate();
    });
    row.querySelector('[data-field="t"]').addEventListener('input', e => {
      entry.stops[idx].t = parseFloat(e.target.value);
      row.querySelector('.t-val').textContent = entry.stops[idx].t.toFixed(2);
      scheduleUpdate();
    });
    row.querySelector('[data-field="hextext"]').addEventListener('change', e => {
      const val = e.target.value.replace(/^#/, '');
      if (/^[0-9a-f]{6}$/i.test(val)) {
        entry.stops[idx].color = parseInt(val, 16);
        row.querySelector('[data-field="color"]').value = '#' + val;
        scheduleUpdate();
      }
    });
    row.querySelector('[data-field="del"]').addEventListener('click', () => {
      if (entry.stops.length <= 2) return;
      entry.stops.splice(idx, 1);
      renderEditor();
    });
  });

  // Add stop
  document.querySelectorAll('.btn-add-stop').forEach(btn => {
    btn.addEventListener('click', () => {
      const layer = btn.dataset.layer;
      const entry = findEntry(selectedPairId, layer);
      if (!entry) return;
      entry.stops.push({ t: 0.5, color: 0x808080 });
      entry.stops.sort((a, b) => a.t - b.t);
      renderEditor();
    });
  });

  // Param sliders
  document.querySelectorAll('[data-param]').forEach(slider => {
    slider.addEventListener('input', e => {
      const layer = e.target.dataset.layer;
      const param = e.target.dataset.param;
      const entry = findEntry(selectedPairId, layer);
      if (!entry) return;
      entry[param] = parseFloat(e.target.value);
      e.target.nextElementSibling.textContent = entry[param].toFixed(2);
      scheduleUpdate();
    });
  });

  // Tint color pickers
  document.querySelectorAll('[data-tint="color"]').forEach(picker => {
    picker.addEventListener('input', e => {
      const layer = e.target.dataset.layer;
      const entry = findEntry(selectedPairId, layer);
      if (!entry) return;
      entry.tint = parseInt(e.target.value.slice(1), 16);
      const hexInput = e.target.parentElement.querySelector('[data-tint="hex"]');
      if (hexInput) hexInput.value = e.target.value.slice(1).toUpperCase();
      scheduleUpdate();
    });
  });
  document.querySelectorAll('[data-tint="hex"]').forEach(input => {
    input.addEventListener('change', e => {
      const val = e.target.value.replace(/^#/, '');
      if (!/^[0-9a-f]{6}$/i.test(val)) return;
      const layer = e.target.dataset.layer;
      const entry = findEntry(selectedPairId, layer);
      if (!entry) return;
      entry.tint = parseInt(val, 16);
      const picker = e.target.parentElement.querySelector('[data-tint="color"]');
      if (picker) picker.value = '#' + val.toLowerCase();
      scheduleUpdate();
    });
  });

  // Parallax text fields
  document.querySelectorAll('[data-plx-field]').forEach(input => {
    input.addEventListener('change', e => {
      const layer = e.target.dataset.layer;
      const field = e.target.dataset.plxField;
      const entry = findEntry(selectedPairId, layer);
      if (!entry) return;
      entry[field] = e.target.value.trim();
    });
  });

  renderGradientBars();
}

let _updateTimer = null;
function scheduleUpdate() {
  if (_updateTimer) cancelAnimationFrame(_updateTimer);
  _updateTimer = requestAnimationFrame(() => {
    renderGradientBars();
    renderPreview();
  });
}

function renderGradientBars() {
  for (const layer of ['BG', 'WALL']) {
    const canvas = document.getElementById('gradBar_' + layer);
    if (!canvas) continue;
    const entry = findEntry(selectedPairId, layer);
    if (!entry) continue;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const img = ctx.createImageData(w, h);
    for (let x = 0; x < w; x++) {
      const t = x / (w - 1);
      const [r, g, b] = sampleRow(entry.stops, t);
      for (let y = 0; y < h; y++) {
        const i = (y * w + x) * 4;
        img.data[i] = Math.round(r);
        img.data[i + 1] = Math.round(g);
        img.data[i + 2] = Math.round(b);
        img.data[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }
}

// ── Map preview ──
function renderPreview() {
  const canvas = document.getElementById('previewCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, MAP_W, MAP_H);

  const bgEntry = findEntry(selectedPairId, 'BG');
  const wallEntry = findEntry(selectedPairId, 'WALL');

  if (bgEntry) renderPaletteLayer(ctx, BG_TILES, bgTilesetImg, bgEntry);
  if (wallEntry) renderPaletteLayer(ctx, WALL_TILES, wallTilesetImg, wallEntry);

  ctx.font = '10px Rajdhani, sans-serif';
  ctx.fillStyle = '#4A8A8A';
  ctx.fillText('BG:' + (bgEntry ? 'OK' : 'NONE') + (bgTilesetImg ? '+TEX' : '') +
    '  WALL:' + (wallEntry ? 'OK' : 'NONE') + (wallTilesetImg ? '+TEX' : ''), 4, MAP_H - 4);
}

function renderPaletteLayer(ctx, tiles, tilesetImg, entry) {
  const lut = buildLUT(entry.stops);
  const brightness = entry.brightness;
  const depthBias = entry.depthBias;
  const depthCenter = entry.depthCenter;
  const tintR = ((entry.tint >> 16) & 0xff) / 255;
  const tintG = ((entry.tint >> 8) & 0xff) / 255;
  const tintB = (entry.tint & 0xff) / 255;

  function samplePalette(luma, screenY) {
    const depthShift = (screenY - depthCenter) * depthBias;
    const biased = Math.max(0, Math.min(1, luma + depthShift));
    const idx = Math.round(biased * 255) * 3;
    return [
      Math.min(255, lut[idx] * brightness * tintR),
      Math.min(255, lut[idx + 1] * brightness * tintG),
      Math.min(255, lut[idx + 2] * brightness * tintB)
    ];
  }

  if (!tilesetImg) {
    for (const tile of tiles) {
      const screenY = (tile.px[1] + TILE / 2) / MAP_H;
      const [r, g, b] = samplePalette(0.5, screenY);
      ctx.fillStyle = packHex(r, g, b);
      ctx.fillRect(tile.px[0], tile.px[1], TILE, TILE);
    }
    return;
  }

  try {
    const off = document.createElement('canvas');
    off.width = MAP_W; off.height = MAP_H;
    const offCtx = off.getContext('2d');
    offCtx.fillStyle = '#808080';
    for (const tile of tiles) offCtx.fillRect(tile.px[0], tile.px[1], TILE, TILE);
    for (const tile of tiles) {
      offCtx.save();
      const fx = (tile.f & 1) ? -1 : 1;
      const fy = (tile.f & 2) ? -1 : 1;
      offCtx.translate(tile.px[0] + (fx < 0 ? TILE : 0), tile.px[1] + (fy < 0 ? TILE : 0));
      offCtx.scale(fx, fy);
      offCtx.drawImage(tilesetImg, tile.src[0], tile.src[1], TILE, TILE, 0, 0, TILE, TILE);
      offCtx.restore();
    }
    const imgData = offCtx.getImageData(0, 0, MAP_W, MAP_H);
    const d = imgData.data;
    for (let y = 0; y < MAP_H; y++) {
      const screenY = y / MAP_H;
      for (let x = 0; x < MAP_W; x++) {
        const i = (y * MAP_W + x) * 4;
        if (d[i + 3] === 0) continue;
        const luma = (d[i] * 0.2126 + d[i + 1] * 0.7152 + d[i + 2] * 0.0722) / 255;
        const [r, g, b] = samplePalette(luma, screenY);
        d[i] = r; d[i + 1] = g; d[i + 2] = b;
      }
    }
    offCtx.putImageData(imgData, 0, 0);
    ctx.drawImage(off, 0, 0);
  } catch (e) {
    console.error('[palette-editor] renderPaletteLayer failed:', e);
    for (const tile of tiles) {
      const screenY = (tile.px[1] + TILE / 2) / MAP_H;
      const [r, g, b] = samplePalette(0.5, screenY);
      ctx.fillStyle = packHex(r, g, b);
      ctx.fillRect(tile.px[0], tile.px[1], TILE, TILE);
    }
  }
}

// ── Status ──
function status(msg, ok) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (ok ? ' ok' : '');
}

// ── localStorage persistence ──
const LS_CSV = 'echoris_palette_csv';
const LS_WALL = 'echoris_palette_wall_tileset';
const LS_BG = 'echoris_palette_bg_tileset';

function saveCSVToStorage(text) {
  try { localStorage.setItem(LS_CSV, text); } catch(e) { /* quota */ }
}
function saveTilesetToStorage(key, file) {
  const reader = new FileReader();
  reader.onload = () => {
    try { localStorage.setItem(key, reader.result); } catch(e) { /* quota */ }
  };
  reader.readAsDataURL(file);
}
function loadImageFromDataURL(dataURL) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = dataURL;
  });
}
async function restoreFromStorage() {
  let restored = 0;
  const csvText = localStorage.getItem(LS_CSV);
  if (csvText) { loadCSV(csvText); restored++; }
  const wallData = localStorage.getItem(LS_WALL);
  if (wallData) {
    try { wallTilesetImg = await loadImageFromDataURL(wallData); restored++; } catch(e) {}
  }
  const bgData = localStorage.getItem(LS_BG);
  if (bgData) {
    try { bgTilesetImg = await loadImageFromDataURL(bgData); restored++; } catch(e) {}
  }
  if (restored > 0) {
    status('Restored ' + restored + ' item(s) from last session', true);
    if (csvEntries.length > 0) renderPreview();
  }
}

// ── File handlers ──
document.getElementById('csvInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  file.text().then(text => { loadCSV(text); saveCSVToStorage(text); });
});
document.getElementById('wallTilesetInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  saveTilesetToStorage(LS_WALL, file);
  const img = new Image();
  img.onload = () => { wallTilesetImg = img; status('WALL tileset loaded', true); renderPreview(); };
  img.src = URL.createObjectURL(file);
});
document.getElementById('bgTilesetInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  saveTilesetToStorage(LS_BG, file);
  const img = new Image();
  img.onload = () => { bgTilesetImg = img; status('BG tileset loaded', true); renderPreview(); };
  img.src = URL.createObjectURL(file);
});

// ── Drag & drop ──
const dropOverlay = document.getElementById('dropOverlay');
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (e.target === dropOverlay) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', e => {
  e.preventDefault(); dropOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) {
    file.text().then(text => { loadCSV(text); saveCSVToStorage(text); });
  }
});

// ── Auto-restore on load ──
restoreFromStorage();
</script>
