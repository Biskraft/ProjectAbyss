<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Cormorant+Garamond:ital,wght@1,300&family=Rajdhani:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; background: #0A0A0A; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  /* Survey grid */
  background-image:
    linear-gradient(rgba(26,58,58,.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,58,58,.15) 1px, transparent 1px);
  background-size: 80px 80px;
}
.logo {
  font-family: 'Cinzel', serif; font-weight: 900; font-size: 120px;
  letter-spacing: 0.12em; text-transform: uppercase; color: #2A8A8A;
  line-height: 0.9; margin-bottom: 20px;
}
.logo span { color: #E87830; }
.tagline {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
  font-size: 28px; color: #6AABA0; opacity: 0.8; margin-bottom: 12px;
}
.genre {
  font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 0.3em;
  text-transform: uppercase; color: #3A6A6A;
}
/* Scanlines */
body::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
}
</style>
</head>
<body>
  <div class="logo">ECHO<span>RIS</span></div>
  <div class="tagline">Enter the memory of your weapon.</div>
  <div class="genre">2D Action RPG &middot; Free in Browser</div>
</body>
</html>
