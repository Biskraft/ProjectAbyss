<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata Forge — Logo Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --abyss: #0A0A12;
  --teal-deep: #1A4A4A;
  --teal: #2A6B6B;
  --teal-light: #3A8A8A;
  --orange: #E87830;
  --orange-deep: #C45A2C;
  --orange-dark: #8B3A1A;
  --incandescent: #FFF5E0;
  --concrete: #6B6B6B;
  --concrete-light: #8A8A8A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--abyss);
  color: var(--incandescent);
  font-family: 'Space Mono', monospace;
  overflow-x: hidden;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.header {
  text-align: center;
  padding: 60px 20px 20px;
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-weight: 400;
  font-size: 14px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--concrete-light);
  margin-bottom: 8px;
}

.header .divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  margin: 0 auto;
}

/* Logo grid */
.concepts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  max-width: 1400px;
  margin: 40px auto;
  padding: 0 40px;
}

.concept {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 30px;
  position: relative;
}

.concept::after {
  content: '';
  position: absolute;
  right: 0;
  top: 15%;
  height: 70%;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--teal-deep), transparent);
}

.concept:last-child::after { display: none; }

.concept-label {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--concrete);
  margin-bottom: 40px;
}

/* SVG Logo containers */
.logo-icon {
  width: 180px;
  height: 180px;
  margin-bottom: 32px;
  filter: drop-shadow(0 0 30px rgba(232, 120, 48, 0.15));
  transition: filter 0.6s ease;
}

.concept:hover .logo-icon {
  filter: drop-shadow(0 0 50px rgba(232, 120, 48, 0.3));
}

/* Wordmark */
.wordmark {
  font-family: 'Cinzel', serif;
  text-align: center;
  margin-bottom: 6px;
}

.wordmark .strata {
  display: block;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--incandescent);
}

.wordmark .forge {
  display: block;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.45em;
  color: var(--orange);
  margin-top: 2px;
}

/* Favicon strip */
.favicon-strip {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid rgba(42, 107, 107, 0.2);
}

.favicon-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.favicon-box span {
  font-size: 9px;
  color: var(--concrete);
  letter-spacing: 0.1em;
}

.favicon-box svg {
  border: 1px solid rgba(42, 107, 107, 0.3);
}

/* Variants section */
.variants-section {
  max-width: 1400px;
  margin: 60px auto 80px;
  padding: 0 40px;
}

.variants-title {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--concrete);
  text-align: center;
  margin-bottom: 30px;
}

.variants-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
}

.variant-card {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.variant-card.dark { background: var(--abyss); border: 1px solid rgba(42, 107, 107, 0.2); }
.variant-card.light { background: #F0EDE8; border: 1px solid rgba(10, 10, 18, 0.1); }

.variant-card svg {
  width: 60%;
  height: 60%;
}

.variant-card .variant-label {
  position: absolute;
  bottom: 6px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.variant-card.dark .variant-label { color: var(--concrete); }
.variant-card.light .variant-label { color: #8A8A8A; }

/* Animations */
@keyframes glow-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes spark-float {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-12px) scale(0.3); opacity: 0; }
}

.glow-animate { animation: glow-pulse 3s ease-in-out infinite; }

/* Responsive */
@media (max-width: 900px) {
  .concepts { grid-template-columns: 1fr; gap: 40px; }
  .concept::after { display: none; }
  .variants-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <h1>Strata Forge — Logo Concepts</h1>
  <div class="divider"></div>
</div>

<div class="concepts">

  <!-- ===== CONCEPT A: Strata Cross-Section ===== -->
  <div class="concept">

          <rect x="2" y="2" width="12" height="3" fill="#2A6B6B"/>

        <line x1="120" y1="110" x2="144" y2="98" stroke="#E87830" stroke-width="0.5" opacity="0.4"/>
        <line x1="100" y1="108" x2="100" y2="96" stroke="#FFF5E0" stroke-width="0.5" opacity="0.3"/>

        <line x1="110" y1="118" x2="128" y2="132"/>
        <line x1="100" y1="118" x2="100" y2="134"/>

    </svg>

    <div class="wordmark">
      <span class="strata">STRATA</span>
      <span class="forge">FORGE</span>
    </div>

    <div class="favicon-strip">
      <div class="favicon-box">

</div>

<!-- ===== VARIANTS SECTION ===== -->

  <div class="variants-title">Background Variants</div>
  <div class="variants-grid">
    <!-- A dark -->
    <div class="variant-card dark">

    <!-- A light -->

        <defs><clipPath id="vs-al"><path d="M100 16 L172 52 L172 130 Q172 160 100 184 Q28 160 28 130 L28 52 Z"/></clipPath></defs>
        <g clip-path="url(#vs-al)">
