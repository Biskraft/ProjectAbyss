<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Abyss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.style.color = '#f44';
      document.body.style.padding = '20px';
      document.body.style.fontFamily = 'monospace';
      document.body.innerHTML = '<h2>Error</h2><pre>' + msg + '\n' + src + ':' + line + ':' + col + '\n' + (err && err.stack || '') + '</pre>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.body.style.color = '#f44';
      document.body.style.padding = '20px';
      document.body.style.fontFamily = 'monospace';
      document.body.innerHTML = '<h2>Error</h2><pre>' + (e.reason && e.reason.stack || e.reason || 'Unknown') + '</pre>';
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
