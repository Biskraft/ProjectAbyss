<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ECHORIS — Item World Map Prototype</title>
<style>
  :root {
    --bg: #0e0e18;
    --panel: #1a1a2e;
    --border: #3a3a52;
    --text: #d8d8e8;
    --dim: #888ab0;
    --accent: #ff8000;
    --critical: #ff4455;
    --branch: #4a4a66;
    --start: #44dd66;
    --boss: #ffcc33;
    --memory: #ff8844;
    --wall: #5a5a72;
    --water: #3388cc;
    --updraft: #66ddff;
    --oneway: #88cc55;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  h1 { color: var(--accent); font-size: 16px; margin: 0 0 4px 0; }
  .subtitle { color: var(--dim); margin-bottom: 16px; }
  .layout { display: flex; gap: 16px; align-items: flex-start; }
  .main { flex: 1; }
  .side { width: 260px; flex-shrink: 0; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 12px;
  }
  .panel h3 { margin: 0 0 8px 0; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  label { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; }
  label span { color: var(--dim); }
  input, select, button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    font: inherit;
    border-radius: 3px;
  }
  input[type=number] { width: 100px; text-align: right; }
  button {
    cursor: pointer;
    background: var(--accent);
    color: #0e0e18;
    font-weight: bold;
    width: 100%;
    padding: 6px;
    margin-top: 8px;
  }
  button:hover { background: #ffa040; }
  canvas {
    background: #05050c;
    border: 1px solid var(--border);
    border-radius: 4px;
    image-rendering: pixelated;
    display: block;
    cursor: crosshair;
  }
  .legend { display: grid; grid-template-columns: 14px 1fr; gap: 4px 8px; margin-top: 6px; font-size: 11px; }
  .sw { width: 14px; height: 14px; border: 1px solid #222; }
  .status { color: var(--dim); font-size: 11px; }
  .cell-detail { font-size: 11px; }
  .cell-detail dt { color: var(--dim); margin-top: 4px; }
  .cell-detail dd { margin: 0 0 2px 0; }
  .tag {
    display: inline-block;
    padding: 1px 6px;
    margin-right: 4px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Item World Map Prototype</h1>
<div class="subtitle">
  Mirrors <code>ItemWorldScene</code> generation. Uses merged LDtk <code>ItemStratum</code> templates.
  Inspired by <a href="https://tinysubversions.com/spelunkyGen2/" target="_blank" style="color:var(--accent)">Spelunky Gen 2</a>.
</div>

<div class="layout">
  <div class="main">
    <div class="panel">
      <canvas id="canvas" width="880" height="520"></canvas>
      <div class="status" id="status">Loading World_ProjectAbyss.ldtk…</div>
    </div>
  </div>

  <div class="side">
    <div class="panel">
      <h3>Seed</h3>
      <label><span>Item UID</span> <input id="uid" type="number" value="1" min="1" /></label>
      <label><span>Rarity</span>
        <select id="rarity">
          <option value="normal">Normal</option>
          <option value="magic" selected>Magic</option>
          <option value="rare">Rare</option>
          <option value="legendary">Legendary</option>
          <option value="ancient">Ancient</option>
        </select>
      </label>
      <label><span>Stratum</span>
        <select id="stratum"></select>
      </label>
      <button id="regen">Regenerate</button>
    </div>

    <div class="panel">
      <h3>Legend</h3>
      <div class="legend">
        <div class="sw" style="background:var(--critical)"></div><div>Critical Path</div>
        <div class="sw" style="background:var(--branch)"></div><div>Branch</div>
        <div class="sw" style="background:var(--start)"></div><div>Start</div>
        <div class="sw" style="background:var(--boss)"></div><div>Boss</div>
        <div class="sw" style="background:var(--memory)"></div><div>Memory</div>
      </div>
    </div>

    <div class="panel">
      <h3>Cell Info</h3>
      <dl class="cell-detail" id="cell-detail">
        <dd style="color:var(--dim)">Click a cell on the left.</dd>
      </dl>
    </div>

    <div class="panel">
      <h3>Stats</h3>
      <div id="stats" class="cell-detail"></div>
    </div>
  </div>
</div>

<script>
// =======================================================================
// PRNG — Mulberry32 (ported from game/src/utils/PRNG.ts)
// =======================================================================
class PRNG {
  constructor(seed) { this.state = seed | 0; }
  next() {
    this.state |= 0;
    this.state = (this.state + 0x6d2b79f5) | 0;
    let t = Math.imul(this.state ^ (this.state >>> 15), 1 | this.state);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  nextInt(min, max) { return min + Math.floor(this.next() * (max - min + 1)); }
}

// =======================================================================
// StrataConfig layout (port of StrataConfig.ts — only grid shape needed)
// =======================================================================
const STRATA_BY_RARITY = {
  normal:    [ {gw:4,gh:4}, {gw:4,gh:4} ],
  magic:     [ {gw:4,gh:4}, {gw:4,gh:4}, {gw:4,gh:4} ],
  rare:      [ {gw:4,gh:4}, {gw:4,gh:4}, {gw:4,gh:4} ],
  legendary: [ {gw:4,gh:4}, {gw:4,gh:4}, {gw:4,gh:4}, {gw:4,gh:4} ],
  ancient:   [ {gw:4,gh:4}, {gw:4,gh:4}, {gw:4,gh:4}, {gw:4,gh:4} ],
};

// =======================================================================
// RoomGrid.ts — critical path + branch rooms
// =======================================================================
const WEIGHT_LEFT = 0.3;
const WEIGHT_RIGHT = 0.3;
const MIN_PATH_RATIO = 0.4;

function generateCriticalPath(gridW, gridH, rng) {
  const minLength = Math.ceil(gridW * gridH * MIN_PATH_RATIO);
  for (let attempt = 0; attempt < 10; attempt++) {
    const path = [];
    const visited = new Set();
    let col = rng.nextInt(0, gridW - 1);
    let row = 0;
    path.push({col, row});
    visited.add(`${col},${row}`);
    while (row < gridH - 1) {
      const roll = rng.next();
      let nextCol = col, nextRow = row;
      if (roll < WEIGHT_LEFT) nextCol = col - 1;
      else if (roll < WEIGHT_LEFT + WEIGHT_RIGHT) nextCol = col + 1;
      else nextRow = row + 1;
      if (nextCol < 0 || nextCol >= gridW) { nextRow = row + 1; nextCol = col; }
      if (visited.has(`${nextCol},${nextRow}`)) { nextRow = row + 1; nextCol = col; }
      col = nextCol;
      row = nextRow;
      path.push({col, row});
      visited.add(`${col},${row}`);
    }
    if (path.length >= minLength) return path;
  }
  // Zigzag fallback
  const path = [];
  let col = 0;
  for (let row = 0; row < gridH; row++) {
    path.push({col, row});
    if (row < gridH - 1) {
      const target = row % 2 === 0 ? gridW - 1 : 0;
      const dir = target > col ? 1 : -1;
      while (col !== target) { col += dir; path.push({col, row}); }
    }
  }
  return path;
}

function connectCells(cells, c1, r1, c2, r2) {
  if (c2 > c1) { cells[r1][c1].exits.right = true; cells[r2][c2].exits.left = true; }
  else if (c2 < c1) { cells[r1][c1].exits.left = true; cells[r2][c2].exits.right = true; }
  if (r2 > r1) { cells[r1][c1].exits.down = true; cells[r2][c2].exits.up = true; }
  else if (r2 < r1) { cells[r1][c1].exits.up = true; cells[r2][c2].exits.down = true; }
}

function determineRoomType(cell) {
  if (cell.exits.down) return 2;
  if (cell.exits.up && !cell.exits.down) return 3;
  if (cell.exits.left || cell.exits.right) return 1;
  return 0;
}

function connectBranchRoom(cells, col, row, gridW, gridH) {
  const dirs = [{dc:-1,dr:0},{dc:1,dr:0},{dc:0,dr:-1},{dc:0,dr:1}];
  for (const {dc, dr} of dirs) {
    const nc = col + dc, nr = row + dr;
    if (nc >= 0 && nc < gridW && nr >= 0 && nr < gridH && cells[nr][nc].onCriticalPath) {
      connectCells(cells, col, row, nc, nr);
      return;
    }
  }
}

function generateRoomGrid(gridW, gridH, rng) {
  const cells = [];
  for (let row = 0; row < gridH; row++) {
    const r = [];
    for (let col = 0; col < gridW; col++) {
      r.push({
        col, row, type: 0, onCriticalPath: false,
        exits: {left:false, right:false, up:false, down:false},
      });
    }
    cells.push(r);
  }
  const path = generateCriticalPath(gridW, gridH, rng);
  for (let i = 0; i < path.length; i++) {
    const {col, row} = path[i];
    cells[row][col].onCriticalPath = true;
    if (i > 0) {
      const prev = path[i-1];
      connectCells(cells, prev.col, prev.row, col, row);
    }
  }
  for (let row = 0; row < gridH; row++) {
    for (let col = 0; col < gridW; col++) {
      const c = cells[row][col];
      if (c.onCriticalPath) c.type = determineRoomType(c);
      else {
        c.type = 1;
        connectBranchRoom(cells, col, row, gridW, gridH);
      }
    }
  }
  return {
    width: gridW, height: gridH, cells,
    startRoom: path[0],
    endRoom: path[path.length - 1],
    criticalPath: path,
  };
}

// =======================================================================
// Template picker (port of pickLdtkTemplate from ItemWorldScene)
// =======================================================================
function pickTemplate(cell, rng, templates, isStart, isBoss) {
  // Exclude memory_ and ItemTunnel_ templates from the random pool
  const pool = templates.filter(t => !/^memory_/i.test(t.identifier) && !/^itemtunnel_/i.test(t.identifier));
  if (pool.length === 0) return null;

  let desiredType;
  if (isStart) desiredType = 'Start';
  else if (isBoss) desiredType = 'Boss';
  else if (!cell.onCriticalPath) {
    const roll = rng.next();
    if (roll < 0.20) desiredType = 'Treasure';
    else if (roll < 0.30) desiredType = 'Rest';
    else if (roll < 0.40) desiredType = 'Puzzle';
    else desiredType = 'Combat';
  } else {
    desiredType = 'Combat';
  }

  const matching = pool.filter(t => t.roomType === desiredType);
  if (matching.length > 0) return matching[rng.nextInt(0, matching.length - 1)];
  return pool[rng.nextInt(0, pool.length - 1)];
}

// =======================================================================
// LDtk fetch + helpers
// =======================================================================
let LDTK = null;
let TEMPLATES = [];

function getRoomType(level) {
  const f = (level.fieldInstances || []).find(f => f.__identifier === 'RoomType' || f.__identifier === 'roomType');
  const v = f?.__value;
  return Array.isArray(v) ? (v[0] ?? null) : (v ?? null);
}

function getCollisionGrid(level) {
  const layer = (level.layerInstances || []).find(l => l.__identifier === 'Collisions');
  if (!layer) return null;
  const w = layer.__cWid, h = layer.__cHei;
  const csv = layer.intGridCsv || [];
  return { w, h, csv };
}

async function loadLdtk() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Fetching World_ProjectAbyss.ldtk…';
  const res = await fetch('assets/World_ProjectAbyss.ldtk');
  if (!res.ok) throw new Error('LDtk fetch failed: ' + res.status);
  LDTK = await res.json();
  const world = LDTK.worlds.find(w => w.identifier === 'ItemStratum');
  if (!world) throw new Error('ItemStratum world not found');

  // Normalize template list (attach roomType + collisionGrid)
  TEMPLATES = world.levels.map(l => ({
    identifier: l.identifier,
    pxWid: l.pxWid,
    pxHei: l.pxHei,
    roomType: getRoomType(l),
    collision: getCollisionGrid(l),
  }));
  statusEl.textContent = `Loaded ${TEMPLATES.length} ItemStratum templates`;
}

// =======================================================================
// Generation entry point
// =======================================================================
let currentGenerated = null; // { grid, placements, meta }

function regenerate() {
  const uid = parseInt(document.getElementById('uid').value, 10);
  const rarity = document.getElementById('rarity').value;
  const stratumIdx = parseInt(document.getElementById('stratum').value, 10);
  const stratumDef = STRATA_BY_RARITY[rarity][stratumIdx];
  if (!stratumDef) return;

  // Same seed as ItemWorldScene: item.uid * 1000 + stratum * 7919
  // (see generateUnifiedGrid in game/src/level/RoomGrid.ts)
  const gridRng = new PRNG(uid * 1000 + stratumIdx * 7919);
  const grid = generateRoomGrid(stratumDef.gw, stratumDef.gh, gridRng);

  // Template picks for each cell (separate PRNG per cell, matching ItemWorldScene)
  const placements = [];
  // NOTE: ItemWorldScene uses absoluteRow, but within a single stratum preview
  // we approximate with stratum offset (use a synthetic offset = stratumIdx * 100).
  const stratumRowOffset = stratumIdx * 100;
  for (let row = 0; row < stratumDef.gh; row++) {
    for (let col = 0; col < stratumDef.gw; col++) {
      const cell = grid.cells[row][col];
      const absRow = stratumRowOffset + row;
      const cellRng = new PRNG(uid * 10000 + col * 100 + absRow);
      const isStart = col === grid.startRoom.col && row === grid.startRoom.row;
      const isBoss = col === grid.endRoom.col && row === grid.endRoom.row;
      const template = pickTemplate(cell, cellRng, TEMPLATES, isStart, isBoss);
      placements.push({col, row, isStart, isBoss, template});
    }
  }

  currentGenerated = { grid, placements, stratumIdx, rarity, uid, stratumDef };
  selectedCellKey = null;
  draw();
  updateStats();
}

// =======================================================================
// Canvas drawing
// =======================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let selectedCellKey = null;

function cellRect(col, row, gridW, gridH) {
  const padding = 20;
  const gap = 6;
  const availW = canvas.width - padding * 2;
  const availH = canvas.height - padding * 2;
  const cw = (availW - gap * (gridW - 1)) / gridW;
  const ch = (availH - gap * (gridH - 1)) / gridH;
  return {
    x: padding + col * (cw + gap),
    y: padding + row * (ch + gap),
    w: cw,
    h: ch,
  };
}

function draw() {
  ctx.fillStyle = '#05050c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!currentGenerated) return;
  const {grid, placements} = currentGenerated;

  // Draw each cell
  for (const p of placements) {
    const rect = cellRect(p.col, p.row, grid.width, grid.height);
    const cell = grid.cells[p.row][p.col];

    // Fill by role
    let fill = '#4a4a66'; // branch default
    if (p.isStart) fill = '#44dd66';
    else if (p.isBoss) fill = '#ffcc33';
    else if (cell.onCriticalPath) fill = '#993344';
    else if (p.template && /^memory_/i.test(p.template.identifier)) fill = '#ff8844';

    // Selected highlight
    const key = `${p.col},${p.row}`;
    const isSelected = key === selectedCellKey;

    ctx.fillStyle = fill;
    ctx.globalAlpha = isSelected ? 1.0 : 0.85;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.globalAlpha = 1;

    // Border
    ctx.strokeStyle = isSelected ? '#ffaa44' : '#222';
    ctx.lineWidth = isSelected ? 3 : 1;
    ctx.strokeRect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1);

    // Critical path indicator (thin red line on top-left corner)
    if (cell.onCriticalPath && !p.isStart && !p.isBoss) {
      ctx.fillStyle = '#ff4455';
      ctx.fillRect(rect.x + 4, rect.y + 4, 8, 8);
    }

    // Mini tile preview (collision grid) inside the cell
    if (p.template?.collision) {
      drawMiniTiles(rect, p.template.collision);
    }

    // Exit markers (center-offset on each side)
    drawExits(rect, cell);

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const label = p.isStart ? 'START ▶' : p.isBoss ? 'BOSS ★' : (p.template?.identifier ?? '—');
    const short = label.length > 22 ? label.substring(0, 20) + '…' : label;
    ctx.fillText(short, rect.x + 6, rect.y + rect.h - 28);

    ctx.fillStyle = '#ccc';
    ctx.font = '9px monospace';
    ctx.fillText(p.template?.roomType ?? '?', rect.x + 6, rect.y + rect.h - 14);
  }

  // Overlay: critical path line between centers
  if (grid.criticalPath?.length > 1) {
    ctx.strokeStyle = '#ff4455';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    for (let i = 0; i < grid.criticalPath.length; i++) {
      const step = grid.criticalPath[i];
      const r = cellRect(step.col, step.row, grid.width, grid.height);
      const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawMiniTiles(rect, collision) {
  const inset = 3;
  const innerX = rect.x + inset;
  const innerY = rect.y + inset;
  const innerW = rect.w - inset * 2;
  const innerH = rect.h - inset * 2 - 32; // reserve bottom for label
  if (innerH <= 0) return;
  const cw = innerW / collision.w;
  const ch = innerH / collision.h;
  for (let ty = 0; ty < collision.h; ty++) {
    for (let tx = 0; tx < collision.w; tx++) {
      const v = collision.csv[ty * collision.w + tx] ?? 0;
      if (v === 0) continue;
      let color = '#5a5a72';
      if (v === 2) color = '#3388cc';
      else if (v === 3) color = '#88cc55';
      else if (v === 4) color = '#66ddff';
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.75;
      ctx.fillRect(innerX + tx * cw, innerY + ty * ch, Math.max(1, cw - 0.3), Math.max(1, ch - 0.3));
    }
  }
  ctx.globalAlpha = 1;
}

function drawExits(rect, cell) {
  ctx.fillStyle = '#ffdd66';
  const mx = rect.x + rect.w / 2;
  const my = rect.y + rect.h / 2;
  const s = 4;
  if (cell.exits.left)  ctx.fillRect(rect.x - 1, my - s / 2, 3, s);
  if (cell.exits.right) ctx.fillRect(rect.x + rect.w - 2, my - s / 2, 3, s);
  if (cell.exits.up)    ctx.fillRect(mx - s / 2, rect.y - 1, s, 3);
  if (cell.exits.down)  ctx.fillRect(mx - s / 2, rect.y + rect.h - 2, s, 3);
}

// =======================================================================
// Interaction
// =======================================================================
canvas.addEventListener('click', (e) => {
  if (!currentGenerated) return;
  const {grid, placements} = currentGenerated;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  for (const p of placements) {
    const r = cellRect(p.col, p.row, grid.width, grid.height);
    if (mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h) {
      selectedCellKey = `${p.col},${p.row}`;
      updateCellDetail(p, grid.cells[p.row][p.col]);
      draw();
      return;
    }
  }
});

function updateCellDetail(p, cell) {
  const el = document.getElementById('cell-detail');
  const exits = Object.entries(cell.exits).filter(([k,v]) => v).map(([k]) => k).join(', ') || 'none';
  el.innerHTML = `
    <dt>Position</dt><dd>(${p.col}, ${p.row})</dd>
    <dt>Template</dt><dd>${p.template?.identifier ?? '—'}</dd>
    <dt>Room Type</dt><dd>${p.template?.roomType ?? '—'}</dd>
    <dt>Role</dt><dd>${p.isStart ? 'START' : p.isBoss ? 'BOSS' : cell.onCriticalPath ? 'Critical Path' : 'Branch'}</dd>
    <dt>Exits</dt><dd>${exits}</dd>
    <dt>Template Size</dt><dd>${p.template ? p.template.pxWid + '×' + p.template.pxHei : '—'}</dd>
  `;
}

function updateStats() {
  const el = document.getElementById('stats');
  if (!currentGenerated) { el.textContent = '—'; return; }
  const {grid, placements, stratumDef} = currentGenerated;
  const criticalCount = placements.filter(p => grid.cells[p.row][p.col].onCriticalPath).length;
  const memoryCount = placements.filter(p => p.template && /^memory_/i.test(p.template.identifier)).length;
  el.innerHTML = `
    <dt>Grid</dt><dd>${grid.width} × ${grid.height}</dd>
    <dt>Total Rooms</dt><dd>${placements.length}</dd>
    <dt>Critical Path</dt><dd>${criticalCount}</dd>
    <dt>Branch Rooms</dt><dd>${placements.length - criticalCount}</dd>
    <dt>Memory Rooms</dt><dd>${memoryCount}</dd>
    <dt>Templates Used</dt><dd>${new Set(placements.map(p => p.template?.identifier).filter(Boolean)).size}</dd>
  `;
}

// =======================================================================
// UI wiring
// =======================================================================
function rebuildStratumOptions() {
  const rarity = document.getElementById('rarity').value;
  const sel = document.getElementById('stratum');
  sel.innerHTML = '';
  const strata = STRATA_BY_RARITY[rarity];
  for (let i = 0; i < strata.length; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Stratum ${i + 1}`;
    sel.appendChild(opt);
  }
}

document.getElementById('regen').addEventListener('click', regenerate);
document.getElementById('uid').addEventListener('change', regenerate);
document.getElementById('rarity').addEventListener('change', () => { rebuildStratumOptions(); regenerate(); });
document.getElementById('stratum').addEventListener('change', regenerate);

(async function main() {
  try {
    rebuildStratumOptions();
    await loadLdtk();
    regenerate();
  } catch (e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
