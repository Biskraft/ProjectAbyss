name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build game
        working-directory: game
        run: |
          npm install
          npm run build

      - name: Assemble site
        run: |
          mkdir -p site/play
          cp -r game/dist/* site/play/
          cp website/index.html site/
          cp -r website/assets site/
          cp website/assets/favicon.ico site/favicon.ico
          cp game/public/CNAME site/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
