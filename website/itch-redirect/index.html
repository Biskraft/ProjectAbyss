<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12}
iframe{width:100%;height:100%;border:none}
#open-btn{position:fixed;top:8px;right:8px;z-index:10;background:#2a9d8f;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;opacity:.6;transition:opacity .2s;text-decoration:none}
#open-btn:hover{opacity:1}
</style>
</head>
<body>
<iframe id="game" src="https://echoris.io/play/"></iframe>
<a id="open-btn" href="https://echoris.io/play/" target="_blank">Open in new tab</a>
</body>
</html>
