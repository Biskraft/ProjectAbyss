<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ECHORIS favicon: black tile, teal/orange serif "E" (ECHO teal + RIS orange split) -->
  <rect width="64" height="64" rx="10" ry="10" fill="#0A0A0A"/>
  <!-- Stylized serif E: vertical stem, three horizontal bars, top/mid teal, bottom orange -->
  <!-- Vertical stem (teal) -->
  <rect x="14" y="10" width="8" height="44" fill="#2A8A8A"/>
  <!-- Top bar (teal) with serif flare -->
  <rect x="14" y="10" width="36" height="8" fill="#2A8A8A"/>
  <rect x="48" y="10" width="4" height="12" fill="#2A8A8A"/>
  <!-- Middle bar (teal), shorter -->
  <rect x="14" y="28" width="28" height="7" fill="#2A8A8A"/>
  <!-- Bottom bar (orange, RIS accent) with serif flare -->
  <rect x="14" y="46" width="36" height="8" fill="#E87830"/>
  <rect x="48" y="42" width="4" height="12" fill="#E87830"/>
  <!-- Serif top/bottom caps on stem -->
  <rect x="10" y="10" width="16" height="3" fill="#2A8A8A"/>
  <rect x="10" y="51" width="16" height="3" fill="#E87830"/>
</svg>
